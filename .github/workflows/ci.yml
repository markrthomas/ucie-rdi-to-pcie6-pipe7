name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Toolchain note: CI uses the OSS CAD Suite (same distribution as local dev), so the
# Verilator that runs here matches the one used to author/verify each commit. This
# removes the apt-Verilator version skew that previously rejected constructs the local
# (newer) Verilator accepts. It also provides iverilog + sby for the upcoming Cocotb
# (Tier 1b) and formal jobs.
jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OSS CAD Suite (verilator, iverilog, sby)
        uses: YosysHQ/setup-oss-cad-suite@v3

      - name: Regression (lint + Verilator smoke)
        working-directory: ${{ github.workspace }}
        run: make regress

  coverage:
    needs: sim
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OSS CAD Suite (verilator, iverilog, sby)
        uses: YosysHQ/setup-oss-cad-suite@v3

      # Lint already ran in sim; build cov model in obj_dir_cov and emit coverage.dat (+ coverage.info if verilator_coverage exists).
      - name: Verilator line coverage build and run
        working-directory: ${{ github.workspace }}
        run: make verilator_cov

      - name: Upload coverage summary (optional)
        uses: actions/upload-artifact@v4
        with:
          name: verilator-coverage-info
          path: coverage.info
          if-no-files-found: ignore

  nl1:
    needs: sim
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OSS CAD Suite (verilator, iverilog, sby)
        uses: YosysHQ/setup-oss-cad-suite@v3

      - name: NUM_LANES=1 smoke (make verilator_nl1)
        working-directory: ${{ github.workspace }}
        run: make verilator_nl1
